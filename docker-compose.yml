services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=neuralnav
      - POSTGRES_PASSWORD=neuralnav
      - POSTGRES_DB=neuralnav
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralnav"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://neuralnav:neuralnav@postgres:5432/neuralnav
      - HF_REPO_ID=${HF_REPO_ID:-unixio/neuralnav-intent-models}
      - HF_TOKEN=${HF_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
